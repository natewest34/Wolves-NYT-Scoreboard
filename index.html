<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Five — Standings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,500;0,600;0,700;1,500&family=Roboto+Mono:wght@400;500;700&display=swap');

  :root{
    --paper:#f6f3ea;
    --paper-line: #d8d2c0;
    --paper-card:#fffdf7;
    --paper-accent:#fbf5e6;
    --ink:#1c1a16;
    --ink-soft:#5a5648;
    --red:#b23a2e;
    --gold:#a9822f;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#161410;
      --paper-line:#3a3628;
      --paper-card:#1e1b14;
      --paper-accent:#241f12;
      --ink:#f1ede0;
      --ink-soft:#b3ab94;
      --red:#e2776a;
      --gold:#dcb45c;
    }
  }
  *{box-sizing:border-box;}
  html{color-scheme: light dark;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', Georgia, serif;
    padding:28px 16px 60px;
  }
  .wrap{max-width:640px;margin:0 auto;}

  /* Masthead */
  .masthead{
    text-align:center;
    border-bottom:3px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:6px;
  }
  .kicker{
    font-family:'Roboto Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--red);
    margin-bottom:6px;
  }
  h1{
    font-size:34px;
    font-weight:700;
    margin:0;
    letter-spacing:.01em;
  }
  .dateline{
    font-family:'Roboto Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    border-top:1px solid var(--paper-line);
    padding-top:6px;
  }

  /* Record callout */
  .record{
    margin-top:18px;
    border:1px solid var(--gold);
    background:var(--paper-accent);
    padding:10px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
  }
  .record-label{
    font-family:'Roboto Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .record-value{
    font-family:'Roboto Mono', monospace;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    text-align:right;
  }

  /* Leaderboard */
  .board{margin-top:26px;}
  .board-title{
    font-family:'Roboto Mono', monospace;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .board-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--paper-line);
  }
  .row{
    display:grid;
    grid-template-columns:34px 1fr auto;
    align-items:baseline;
    gap:12px;
    padding:11px 4px;
    border-bottom:1px solid var(--paper-line);
  }
  .row:first-child{border-top:1px solid var(--paper-line);}
  .rank{
    font-family:'Roboto Mono', monospace;
    font-size:13px;
    color:var(--ink-soft);
  }
  .row.first .rank{color:var(--gold); font-weight:700;}
  .row.tie-row .name{ font-style:italic; color:var(--red); }
  .row.tie-row .rank{ color:var(--red); }
  .name{font-size:19px; font-weight:600;}
  .pts-block{text-align:right;}
  .wins{
    font-family:'Roboto Mono', monospace;
    font-size:18px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .wins small{font-weight:400; color:var(--ink-soft); font-size:11px; margin-left:3px; text-transform:uppercase; letter-spacing:.05em;}
  .points-sub{
    font-family:'Roboto Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .empty{
    font-family:'Roboto Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    padding:14px 4px;
    text-align:center;
  }

  /* Entry form */
  .entry{
    margin-top:34px;
    border:1px solid var(--ink);
    padding:18px;
    background:var(--paper-card);
  }
  .entry-title{
    font-family:'Roboto Mono', monospace;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-bottom:14px;
    color:var(--ink);
  }
  label{
    display:block;
    font-family:'Roboto Mono', monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .field{margin-bottom:14px;}
  select, input[type=number], input[type=date], input[type=text]{
    width:100%;
    font-family:'Source Serif 4', Georgia, serif;
    font-size:16px;
    padding:9px 8px;
    border:1px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    border-radius:0;
  }
  .winner-picker{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    font-family:'Roboto Mono', monospace;
    font-size:13px;
    padding:8px 12px;
    border:1px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    user-select:none;
  }
  .chip.selected{
    background:var(--ink);
    color:var(--paper);
  }
  .hint{
    font-family:'Roboto Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    margin-top:6px;
  }
  button{
    font-family:'Roboto Mono', monospace;
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:11px 16px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    cursor:pointer;
  }
  button:active{transform:translateY(1px);}
  button.secondary{
    background:transparent;
    color:var(--ink);
  }
  button.danger{
